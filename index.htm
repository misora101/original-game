<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マージボール</title>

<style>
body{
    background:#222;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    gap:20px;
}

#left{
    text-align:center;
}

h1{
    margin:10px;
}

#score{
    font-size:20px;
}

#gameover{
    font-size:26px;
    color:red;
}

canvas{
    background:#333;
    border-radius:10px;
}

#info{
    margin-top:10px;
}

#side{
    width:200px;
}

.table{
    background:#111;
    padding:10px;
    border-radius:10px;
}

.item{
    margin:5px 0;
}
</style>
</head>

<body>

<div id="left">
    <h1>⚪ マージボール</h1>
    <div id="score">スコア: 0</div>
    <div id="gameover"></div>
    <canvas id="game" width="300" height="500"></canvas>
    <div id="info">← → で移動 / ↓ で落とす</div>
</div>

<div id="side">
    <h3>スコア表</h3>
    <div class="table" id="scoreTable"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let gameOver = false;

// ボール種類
const balls = [
{r:15, color:"#7fff7f", score:1},
{r:20, color:"#00ff00", score:3},
{r:25, color:"#ffff00", score:6},
{r:30, color:"#ffa500", score:10},
{r:35, color:"#ff4500", score:20},
{r:40, color:"#ff0000", score:40}
];

// スコア表表示
const table = document.getElementById("scoreTable");
balls.forEach((b,i)=>{
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span style="color:${b.color}">●</span> Lv${i+1} : ${b.score}`;
    table.appendChild(div);
});

let objects = [];

// 操作中ボール
let current = {
    x:150,
    y:20,
    type:0,
    active:true
};

// 新しいボール
function newBall(){
    current = {
        x:150,
        y:20,
        type:Math.floor(Math.random()*2),
        active:true
    };
}

// 更新
function update(){
    if(gameOver) return;

    // 落下中
    if(!current.active){
        current.vy += 0.3;
        current.y += current.vy;

        if(current.y > canvas.height - balls[current.type].r){
            current.y = canvas.height - balls[current.type].r;
            current.vy = 0;
            objects.push(current);
            newBall();
        }
    }

    // 既存ボール
    for(let o of objects){
        o.vy += 0.3;
        o.y += o.vy;

        if(o.y > canvas.height - balls[o.type].r){
            o.y = canvas.height - balls[o.type].r;
            o.vy *= -0.3;
        }
    }

    // 衝突＆合体
    let all = objects.slice();

    for(let i=0;i<all.length;i++){
        for(let j=i+1;j<all.length;j++){
            let a = all[i];
            let b = all[j];

            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let r = balls[a.type].r + balls[b.type].r;

            if(dist < r){
                if(a.type === b.type && a.type < balls.length-1){
                    a.type++;
                    a.x = (a.x + b.x)/2;
                    a.y = (a.y + b.y)/2;

                    score += balls[a.type].score;
                    document.getElementById("score").innerText = "スコア: " + score;

                    objects.splice(objects.indexOf(b),1);
                }else{
                    let angle = Math.atan2(dy,dx);
                    let overlap = r - dist;

                    a.x += Math.cos(angle)*overlap/2;
                    a.y += Math.sin(angle)*overlap/2;
                    b.x -= Math.cos(angle)*overlap/2;
                    b.y -= Math.sin(angle)*overlap/2;
                }
            }
        }
    }

    // ゲームオーバー
    for(let o of objects){
        if(o.y - balls[o.type].r < 0){
            gameOver = true;
            document.getElementById("gameover").innerText =
                "ゲームオーバー！ 最終スコア: " + score;
        }
    }
}

// 描画
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 落とす位置ガイド
    if(current.active){
        ctx.beginPath();
        ctx.arc(current.x, current.y, balls[current.type].r, 0, Math.PI*2);
        ctx.strokeStyle = "white";
        ctx.stroke();
    }

    // 現在のボール
    if(!current.active){
        ctx.beginPath();
        ctx.arc(current.x, current.y, balls[current.type].r, 0, Math.PI*2);
        ctx.fillStyle = balls[current.type].color;
        ctx.fill();
    }

    // 固定ボール
    for(let o of objects){
        ctx.beginPath();
        ctx.arc(o.x, o.y, balls[o.type].r, 0, Math.PI*2);
        ctx.fillStyle = balls[o.type].color;
        ctx.fill();
    }
}

// ループ
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// 操作
document.addEventListener("keydown", (e)=>{
    if(gameOver) return;

    if(current.active){
        if(e.key === "ArrowLeft"){
            current.x -= 20;
        }
        if(e.key === "ArrowRight"){
            current.x += 20;
        }
        if(e.key === "ArrowDown"){
            current.active = false;
            current.vy = 0;
        }

        // 範囲制限
        if(current.x < 0) current.x = 0;
        if(current.x > canvas.width) current.x = canvas.width;
    }
});

// 初期化
newBall();

</script>

</body>
</html>
