<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニスイカゲーム風</title>

<style>
body{
    background:#222;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

h1{
    margin:10px;
}

#score{
    font-size:20px;
}

#gameover{
    font-size:28px;
    color:red;
    margin:10px;
}

canvas{
    background:#333;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1>🍉 ミニスイカゲーム風</h1>
<div id="score">スコア: 0</div>
<div id="gameover"></div>
<canvas id="game" width="300" height="500"></canvas>
<br>
<button onclick="resetGame()">リスタート</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let gameOver = false;

// フルーツ定義
const fruits = [
{r:15, color:"#7fff7f", score:1},
{r:20, color:"#00ff00", score:3},
{r:25, color:"#ffff00", score:6},
{r:30, color:"#ffa500", score:10},
{r:35, color:"#ff4500", score:20},
{r:40, color:"#ff0000", score:40}
];

let objects = [];

// 生成
function spawn(x){
    if(gameOver) return;
    objects.push({
        x:x,
        y:20,
        vx:0,
        vy:0,
        type:Math.floor(Math.random()*2)
    });
}

// 更新
function update(){
    if(gameOver) return;

    for(let o of objects){
        o.vy += 0.3;
        o.y += o.vy;

        // 床
        if(o.y > canvas.height - fruits[o.type].r){
            o.y = canvas.height - fruits[o.type].r;
            o.vy *= -0.3;
        }
    }

    // 衝突＋合体
    for(let i=0;i<objects.length;i++){
        for(let j=i+1;j<objects.length;j++){
            let a = objects[i];
            let b = objects[j];

            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let r = fruits[a.type].r + fruits[b.type].r;

            if(dist < r){
                if(a.type === b.type && a.type < fruits.length-1){
                    a.type++;
                    a.x = (a.x + b.x)/2;
                    a.y = (a.y + b.y)/2;

                    score += fruits[a.type].score;
                    document.getElementById("score").innerText = "スコア: " + score;

                    objects.splice(j,1);
                    j--;
                }else{
                    let angle = Math.atan2(dy,dx);
                    let overlap = r - dist;

                    a.x += Math.cos(angle)*overlap/2;
                    a.y += Math.sin(angle)*overlap/2;
                    b.x -= Math.cos(angle)*overlap/2;
                    b.y -= Math.sin(angle)*overlap/2;
                }
            }
        }
    }

    // 🟥 ゲームオーバー判定（上に達したら）
    for(let o of objects){
        if(o.y - fruits[o.type].r < 0){
            gameOver = true;
            document.getElementById("gameover").innerText = "ゲームオーバー！";
        }
    }
}

// 描画
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let o of objects){
        let f = fruits[o.type];
        ctx.beginPath();
        ctx.arc(o.x, o.y, f.r, 0, Math.PI*2);
        ctx.fillStyle = f.color;
        ctx.fill();
    }
}

// ループ
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// クリックで落とす
canvas.addEventListener("click", (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    spawn(x);
});

// リセット
function resetGame(){
    objects = [];
    score = 0;
    gameOver = false;
    document.getElementById("score").innerText = "スコア: 0";
    document.getElementById("gameover").innerText = "";
}
</script>

</body>
</html>
