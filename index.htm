<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マージボール</title>

<style>
body{
    background:#1a1a1a;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    gap:20px;
}

#left{
    text-align:center;
}

canvas{
    border-radius:10px;
}

#score{ font-size:20px; }
#gameover{ color:red; font-size:24px; }

#side{
    width:200px;
}

.table{
    background:#111;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="left">
<h1>⚪ マージボール</h1>
<div id="score">スコア: 0</div>
<div id="gameover"></div>
<canvas id="game" width="300" height="500"></canvas>
<div>← → 移動 / ↓ 落とす</div>
</div>

<div id="side">
<h3>スコア表</h3>
<div class="table" id="scoreTable"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let gameOver = false;

// ボール設定
const balls = [
{r:12, score:1, type:"pingpong"},
{r:18, score:3, type:"tennis"},
{r:22, score:6, type:"baseball"},
{r:28, score:10, type:"rugby"},
{r:32, score:20, type:"soccer"},
{r:38, score:40, type:"basket"}
];

// スコア表
const table = document.getElementById("scoreTable");
balls.forEach((b,i)=>{
    let div=document.createElement("div");
    div.innerHTML="Lv"+(i+1)+" : "+b.score;
    table.appendChild(div);
});

let objects=[];

// 操作中
let current;

// 新規ボール
function newBall(){
    current={
        x:150,
        y:30,
        vy:0,
        type:Math.floor(Math.random()*2),
        active:true
    };
}

// 更新
function update(){
    if(gameOver) return;

    // 落下中
    if(!current.active){
        current.vy+=0.4;
        current.y+=current.vy;

        for(let o of objects){
            let dx=current.x-o.x;
            let dy=current.y-o.y;
            let dist=Math.sqrt(dx*dx+dy*dy);
            let r=balls[current.type].r+balls[o.type].r;

            if(dist<r){
                // ⭐ 入れ替わり防止：上に固定
                current.y = o.y - r;
                current.vy = 0;
            }
        }

        // 床
        if(current.y>canvas.height-balls[current.type].r){
            current.y=canvas.height-balls[current.type].r;
            current.vy=0;
            objects.push(current);
            newBall();
        }
    }

    // 既存
    for(let o of objects){
        o.vy+=0.3;
        o.y+=o.vy;

        if(o.y>canvas.height-balls[o.type].r){
            o.y=canvas.height-balls[o.type].r;
            o.vy=0;
        }
    }

    // 合体
    for(let i=0;i<objects.length;i++){
        for(let j=i+1;j<objects.length;j++){
            let a=objects[i];
            let b=objects[j];

            let dx=a.x-b.x;
            let dy=a.y-b.y;
            let dist=Math.sqrt(dx*dx+dy*dy);
            let r=balls[a.type].r+balls[b.type].r;

            if(dist<r && a.type===b.type && a.type<balls.length-1){
                a.type++;
                a.x=(a.x+b.x)/2;
                a.y=(a.y+b.y)/2;

                score+=balls[a.type].score;
                document.getElementById("score").innerText="スコア: "+score;

                objects.splice(j,1);
                j--;
            }
        }
    }

    // ゲームオーバー
    for(let o of objects){
        if(o.y-balls[o.type].r<0){
            gameOver=true;
            document.getElementById("gameover").innerText=
            "ゲームオーバー！ 最終スコア: "+score;
        }
    }
}

// 体育館背景
function drawBackground(){
    ctx.fillStyle="#c69c6d"; // 木床
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="white";
    ctx.lineWidth=2;

    // センターライン
    ctx.beginPath();
    ctx.moveTo(0,250);
    ctx.lineTo(300,250);
    ctx.stroke();
}

// ボール描画
function drawBall(x,y,type){
    let b=balls[type];

    ctx.beginPath();

    if(b.type==="pingpong"){
        ctx.fillStyle="white";
        ctx.arc(x,y,b.r,0,Math.PI*2);
        ctx.fill();
    }

    if(b.type==="tennis"){
        ctx.fillStyle="yellow";
        ctx.arc(x,y,b.r,0,Math.PI*2);
        ctx.fill();
    }

    if(b.type==="baseball"){
        ctx.fillStyle="white";
        ctx.arc(x,y,b.r,0,Math.PI*2);
        ctx.fill();
        ctx.strokeStyle="red";
        ctx.stroke();
    }

    if(b.type==="rugby"){
        ctx.fillStyle="#8b4513";
        ctx.ellipse(x,y,b.r,b.r*0.7,0,0,Math.PI*2);
        ctx.fill();
    }

    if(b.type==="soccer"){
        ctx.fillStyle="white";
        ctx.arc(x,y,b.r,0,Math.PI*2);
        ctx.fill();
    }

    if(b.type==="basket"){
        ctx.fillStyle="orange";
        ctx.arc(x,y,b.r,0,Math.PI*2);
        ctx.fill();
    }
}

// 描画
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBackground();

    // 操作中も表示
    drawBall(current.x,current.y,current.type);

    for(let o of objects){
        drawBall(o.x,o.y,o.type);
    }
}

// ループ
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// 操作
document.addEventListener("keydown",(e)=>{
    if(gameOver) return;

    if(current.active){
        if(e.key==="ArrowLeft") current.x-=20;
        if(e.key==="ArrowRight") current.x+=20;
        if(e.key==="ArrowDown"){
            current.active=false;
            current.vy=0;
        }

        if(current.x<0) current.x=0;
        if(current.x>canvas.width) current.x=canvas.width;
    }
});

newBall();
</script>

</body>
</html>
